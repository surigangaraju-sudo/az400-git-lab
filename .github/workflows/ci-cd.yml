name: GitHub Actions CI/CD

on:
  push:
    branches:
      - main
      - feature/*

  pull_request:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Display Build Message
      run: echo "Starting GitHub Actions Build"

    - name: Create Artifact
      run: |
        mkdir output
        echo "AZ-400 GitHub Actions Practice" > output/app.txt

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact
        path: output/

  deploy:
    needs: build

    runs-on: ubuntu-latest

    steps:

    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: build-artifact

    - name: Deploy Step
      run: echo "Deploying application"